          type: string
          minLength: 1

    IntegrationStatus:
      type: object
      required: [provider, configured, missing]
      properties:
        provider:
          type: string
        configured:
          type: boolean
        missing:
          type: array
          items:
            type: string

    VoiceRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
        voiceId:
          type: ["string", "null"]

    VoiceResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        audioBase64:
          type: ["string", "null"]
        contentType:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    VideoRequest:
      type: object
      required: [script]
      properties:
        script:
          type: string
          minLength: 1
        avatarId:
          type: ["string", "null"]

    VideoResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        videoId:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    DashboardSummary:
      type: object
      required:
        - totalDemands
        - resolvedDemands
        - openDemands
        - pendingAppointments
        - byStatus
        - recentDemands
      properties:
        totalDemands:
          type: integer
        resolvedDemands:
          type: integer
        openDemands:
          type: integer
        pendingAppointments:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        recentDemands:
          type: array
          items:
            $ref: "#/components/schemas/Demand"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`).
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
