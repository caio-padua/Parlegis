openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Gabinete Digital Cícero João
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Public
    description: Public portal endpoints (no auth)
  - name: Citizen
    description: Authenticated citizen endpoints
  - name: Admin
    description: Team / admin management endpoints
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      tags: [Citizen]
      operationId: getCurrentUser
      summary: Get the current authenticated user (just-in-time provisioned)
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /mandate-stats:
    get:
      tags: [Public]
      operationId: getMandateStats
      summary: Mandate in numbers (requerimentos, indicações, projetos de lei, etc.)
      responses:
        "200":
          description: Mandate statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandateStats"
    patch:
      tags: [Admin]
      operationId: updateMandateStats
      summary: Update mandate statistics (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MandateStatsInput"
      responses:
        "200":
          description: Updated mandate statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MandateStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /categories:
    get:
      tags: [Public]
      operationId: listCategories
      summary: List demand categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /neighborhoods:
    get:
      tags: [Public]
      operationId: listNeighborhoods
      summary: List neighborhoods (bairros)
      responses:
        "200":
          description: Neighborhoods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Neighborhood"

  /stats/demands-by-neighborhood:
    get:
      tags: [Public]
      operationId: getDemandsByNeighborhood
      summary: Aggregate demand counts grouped by neighborhood
      responses:
        "200":
          description: Counts by neighborhood
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeighborhoodCount"

  /stats/demands-by-category:
    get:
      tags: [Public]
      operationId: getDemandsByCategory
      summary: Aggregate demand counts grouped by category
      responses:
        "200":
          description: Counts by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /track/{protocol}:
    get:
      tags: [Public]
      operationId: trackDemand
      summary: Track a demand publicly by its protocol number
      parameters:
        - name: protocol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Demand tracking information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemandTracking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /demands:
    post:
      tags: [Citizen]
      operationId: createDemand
      summary: Submit a new demand (citizen)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemandInput"
      responses:
        "201":
          description: Demand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Demand"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /me/demands:
    get:
      tags: [Citizen]
      operationId: listMyDemands
      summary: List the current citizen's demands (history)
      responses:
        "200":
          description: Demands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Demand"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /demands/{id}:
    get:
      tags: [Citizen]
      operationId: getDemand
      summary: Get a single demand (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Demand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Demand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /demands/{id}/activities:
    get:
      tags: [Citizen]
      operationId: listDemandActivities
      summary: List the timeline/updates of a demand (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemandActivity"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/demands:
    get:
      tags: [Admin]
      operationId: listDemands
      summary: List and filter all demands (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: neighborhoodId
          in: query
          required: false
          schema:
            type: integer
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Demands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Demand"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/demands/{id}/activities:
    post:
      tags: [Admin]
      operationId: createDemandActivity
      summary: Add an update / change status of a demand (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemandActivityInput"
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemandActivity"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/dashboard:
    get:
      tags: [Admin]
      operationId: getDashboardSummary
      summary: Admin dashboard summary (counts, recent activity)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/team:
    get:
      tags: [Admin]
      operationId: listTeam
      summary: List gabinete staff members (governance)
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      tags: [Admin]
      operationId: createTeamMember
      summary: Invite/create a staff member by email (governance)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Team member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/team/{id}:
    patch:
      tags: [Admin]
      operationId: updateTeamMember
      summary: Update a staff member's cargo, permissions or active state
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Team member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /projects:
    get:
      tags: [Public]
      operationId: listProjects
      summary: List projects and laws
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [Admin]
      operationId: createProject
      summary: Create a project / law (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /projects/{id}:
    get:
      tags: [Public]
      operationId: getProject
      summary: Get a single project / law
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      tags: [Admin]
      operationId: updateProject
      summary: Update a project / law (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      tags: [Admin]
      operationId: deleteProject
      summary: Delete a project / law (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /news:
    get:
      tags: [Public]
      operationId: listNews
      summary: List news articles
      responses:
        "200":
          description: News
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsArticle"
    post:
      tags: [Admin]
      operationId: createNewsArticle
      summary: Create a news article (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsArticleInput"
      responses:
        "201":
          description: News article created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /news/{id}:
    get:
      tags: [Public]
      operationId: getNewsArticle
      summary: Get a single news article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      tags: [Admin]
      operationId: updateNewsArticle
      summary: Update a news article (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsArticleUpdate"
      responses:
        "200":
          description: News article updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      tags: [Admin]
      operationId: deleteNewsArticle
      summary: Delete a news article (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /agenda:
    get:
      tags: [Public]
      operationId: listAgenda
      summary: List public agenda events
      responses:
        "200":
          description: Agenda events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgendaEvent"
    post:
      tags: [Admin]
      operationId: createAgendaEvent
      summary: Create an agenda event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgendaEventInput"
      responses:
        "201":
          description: Agenda event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgendaEvent"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /agenda/{id}:
    patch:
      tags: [Admin]
      operationId: updateAgendaEvent
      summary: Update an agenda event (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgendaEventUpdate"
      responses:
        "200":
          description: Agenda event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgendaEvent"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      tags: [Admin]
      operationId: deleteAgendaEvent
      summary: Delete an agenda event (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /appointments:
    post:
      tags: [Citizen]
      operationId: createAppointment
      summary: Request an in-person service appointment (atendimento)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /appointment-slots:
    get:
      tags: [Citizen]
      operationId: listAvailableSlots
      summary: List released appointment slots with remaining availability
      responses:
        "200":
          description: Released slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentSlot"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/appointment-slots:
    get:
      tags: [Admin]
      operationId: listSlots
      summary: List all appointment slots (staff)
      responses:
        "200":
          description: Slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentSlot"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      tags: [Admin]
      operationId: createSlot
      summary: Create an appointment slot card (manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentSlotInput"
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentSlot"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/appointment-slots/{id}:
    patch:
      tags: [Admin]
      operationId: updateSlot
      summary: Release/hold or adjust an appointment slot card (manager)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentSlotUpdate"
      responses:
        "200":
          description: Slot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentSlot"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/voters:
    get:
      tags: [Admin]
      operationId: listVoters
      summary: List voters / constituents (CRM)
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Voters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voter"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      tags: [Admin]
      operationId: createVoter
      summary: Add a voter to the CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voter"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/voters/{id}:
    patch:
      tags: [Admin]
      operationId: updateVoter
      summary: Update a voter record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoterInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voter"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      tags: [Admin]
      operationId: deleteVoter
      summary: Remove a voter record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/voters/birthdays:
    get:
      tags: [Admin]
      operationId: listBirthdays
      summary: Voters with birthdays in the next N days (default 7)
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Birthday voters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BirthdayVoter"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/messages:
    get:
      tags: [Admin]
      operationId: listMessages
      summary: Outbound message log
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      tags: [Admin]
      operationId: createMessage
      summary: Queue an outbound message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/messages/{id}/send:
    post:
      tags: [Admin]
      operationId: sendMessage
      summary: Attempt to dispatch a queued message via its channel provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dispatch attempted (see status / error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/gifts:
    get:
      tags: [Admin]
      operationId: listGifts
      summary: List brindes (gifts) workflow
      responses:
        "200":
          description: Gifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gift"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      tags: [Admin]
      operationId: createGift
      summary: Register a brinde for a voter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftInput"
      responses:
        "201":
          description: Created
          content:
