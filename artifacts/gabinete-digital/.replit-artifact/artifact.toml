kind = "web"
previewPath = "/"
title = "Gabinete Digital Cícero João"
version = "1.0.0"
id = "artifacts/gabinete-digital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21599

[services.development]
run = "pnpm --filter @workspace/gabinete-digital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gabinete-digital", "run", "build" ]
publicDir = "artifacts/gabinete-digital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21599"
BASE_PATH = "/"
